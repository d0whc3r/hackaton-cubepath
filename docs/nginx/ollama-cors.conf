server {
    listen 80;
    server_name hackaton-cubepath.d0w.dev;
    location / {
        # CORS Configuration
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

        # Fast response for preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Prevent native Ollama 403 error by removing the Origin header
        proxy_set_header Origin "";
        
        # Streaming Support (SSE / Chunked Transfer)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        keepalive_timeout 86400s;
        
        proxy_pass http://localhost:11434;
        proxy_set_header Host localhost:11434;
    }
}

server {
    listen 443 ssl;
    server_name hackaton-cubepath.d0w.dev;

    ssl_certificate /etc/ssl/certs/ollama-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/ollama-selfsigned.key;

