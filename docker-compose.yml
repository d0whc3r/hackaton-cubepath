services:
  app:
    build: .
    ports:
      - '4321:4321'
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EXPLAIN_MODEL=phi3.5
      - OLLAMA_TEST_MODEL=qwen2.5-coder:7b
      - OLLAMA_REFACTOR_MODEL=qwen2.5-coder:7b
      - OLLAMA_COMMIT_MODEL=qwen2.5-coder:7b
      - OLLAMA_TRANSLATE_MODEL=icky/translate
      - OLLAMA_ANALYST_MODEL=llama3.2:1b
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    ports:
      - '11434:11434'
    volumes:
      - ./ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 5
