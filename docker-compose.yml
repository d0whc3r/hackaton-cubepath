services:
  app:
    build: .
    ports:
      - '4321:4321'
    # Este es un sitio estático: las variables PUBLIC_* se embeben en el bundle
    # durante `pnpm build` (dentro del contenedor).
    # La URL de Ollama también se puede cambiar desde la UI en /settings
    # (se persiste en localStorage sin necesidad de reconstruir la imagen).
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    ports:
      - '11434:11434'
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 5
