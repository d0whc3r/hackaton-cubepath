apiVersion: 1

# Datasources para Cubepath observability stack
# Actualiza los valores de url/credentials según tu entorno Grafana Cloud
datasources:
  - name: Loki
    type: loki
    uid: loki-cubepath
    access: proxy
    # Grafana Cloud: https://logs-prod-us-west-0.grafana.net
    # Local: http://loki:3100
    url: ${LOKI_URL}
    basicAuth: true
    basicAuthUser: ${GRAFANA_INSTANCE_ID}
    secureJsonData:
      basicAuthPassword: ${GRAFANA_CLOUD_TOKEN}
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: RequestID
          matcherRegex: '"requestId":"([^"]+)"'
          url: '/explore?orgId=1&left={"datasource":"tempo-cubepath","queries":[{"query":"{.requestId=\"${__value.raw}\"}","queryType":"traceql"}]}'
          urlDisplayLabel: 'Ver traza en Tempo'
    isDefault: false

  - name: Prometheus
    type: prometheus
    uid: prometheus-cubepath
    access: proxy
    # Grafana Cloud Mimir: https://prometheus-prod-01-eu-west-0.grafana.net/api/prom
    # Local: http://prometheus:9090
    url: ${PROMETHEUS_URL}
    basicAuth: true
    basicAuthUser: ${GRAFANA_INSTANCE_ID}
    secureJsonData:
      basicAuthPassword: ${GRAFANA_CLOUD_TOKEN}
    jsonData:
      timeInterval: '15s'
      httpMethod: POST
    isDefault: true

  - name: Tempo
    type: tempo
    uid: tempo-cubepath
    access: proxy
    # Grafana Cloud Tempo: https://tempo-prod-04-prod-us-east-0.grafana.net
    # Local: http://tempo:3200
    url: ${TEMPO_URL}
    basicAuth: true
    basicAuthUser: ${GRAFANA_INSTANCE_ID}
    secureJsonData:
      basicAuthPassword: ${GRAFANA_CLOUD_TOKEN}
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus-cubepath
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki-cubepath
    isDefault: false
