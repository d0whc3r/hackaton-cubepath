sonar.sources=src
sonar.tests=src/__tests__

sonar.inclusions=src/**/*.ts,src/**/*.tsx,src/**/*.astro
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/__tests__/**/*

sonar.exclusions=.agents/**,.agent/**,.trae/**,.claude/**,.codex/**,.opencode/**,.specify/**,.vscode/**,.huksy/**,node_modules/**,dist/**,coverage/**,docs/**,public/**
sonar.cpd.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/__tests__/**/*

sonar.javascript.lcov.reportPaths=coverage/lcov.info
